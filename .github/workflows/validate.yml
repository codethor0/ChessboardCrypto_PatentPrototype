name: Validate

on:
  push:
    branches: [main, master, public-release]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest -q
      - name: Run proof pipeline
        run: python run_full_proof.py
      - name: Run state-tree demo
        run: python scripts/state_tree_demo.py
