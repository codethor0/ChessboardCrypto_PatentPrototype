name: Validate

on:
  push:
    branches: [main, master, public-release]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHON: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest -q
      - name: Run proof pipeline
        run: python run_full_proof.py
      - name: Run state-tree demo
        run: python scripts/state_tree_demo.py
      - name: Run Makefile validation targets
        run: |
          make test
          make proof
          make demo
